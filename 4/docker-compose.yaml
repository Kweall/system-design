version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: pillow-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - ./scripts/mongodb/init.js:/docker-entrypoint-initdb.d/init.js:ro
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
      MONGO_INITDB_DATABASE: pillow_db
    restart: unless-stopped
  postgres:
    image: postgres:15-alpine
    container_name: pillow-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: pillow_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
  api:
    build: .
    container_name: pillow-api
    ports:
      - "8082:8080"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./config/config.yaml:/etc/pillow/config.yaml:ro
    environment:
      - USERVER_CONFIG=/etc/pillow/config.yaml
    restart: unless-stopped

volumes:
  postgres_data:
  mongodb_data: