services:
  postgres:
    image: postgres:15-alpine
    container_name: pillow-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: pillow_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
  api:
    build: .
    container_name: pillow-api
    ports:
      - "8082:8080"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./config/config.yaml:/etc/pillow/config.yaml:ro
    environment:
      - USERVER_CONFIG=/etc/pillow/config.yaml
    restart: unless-stopped

volumes:
  postgres_data: